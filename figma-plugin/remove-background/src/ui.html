<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 16px;
        font: 12px/1.45 "Inter", system-ui, sans-serif;
        color: #0a0a0a;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 14px;
        font-weight: 600;
      }
      p {
        margin: 0 0 14px;
        color: #666;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        background: #0a0a0a;
        color: #fff;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      #status {
        margin-top: 12px;
        min-height: 18px;
        font-size: 11px;
        color: #666;
      }
      #status.error { color: #b00020; }
    </style>
  </head>
  <body>
    <h1>Détourer le fond</h1>
    <p>Sélectionnez un calque image — le détourage remove.bg se lance automatiquement.</p>
    <button id="run" type="button">Relancer le détourage</button>
    <div id="status">Chargement…</div>
    <!-- UI_SCRIPT -->
  </body>
</html>
