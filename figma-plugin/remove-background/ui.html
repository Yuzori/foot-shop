<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 16px;
        font: 12px/1.45 "Inter", system-ui, sans-serif;
        color: #0a0a0a;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 14px;
        font-weight: 600;
      }
      p {
        margin: 0 0 14px;
        color: #666;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 8px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        background: #0a0a0a;
        color: #fff;
      }
      button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      #status {
        margin-top: 12px;
        min-height: 18px;
        font-size: 11px;
        color: #666;
      }
      #status.error { color: #b00020; }
    </style>
  </head>
  <body>
    <h1>Détourer le fond</h1>
    <p>Sélectionnez un calque image — le détourage remove.bg se lance automatiquement.</p>
    <button id="run" type="button">Relancer le détourage</button>
    <div id="status">Chargement…</div>
    <script>
"use strict";
(() => {
  // <define:__REMOVEBG_API_KEYS__>
  var define_REMOVEBG_API_KEYS_default = ["xRnvF9VReq9Ro9kbxBYbH3sh", "aEc3VsjaDYHfTQjLfXzQq5nj", "mbLvDUHHbpndG6Ahgo96DB2X", "fK9Awn1Qz8dzqdkSVBbZrgnq", "aSxPi728ogaZ9RXrmpKhp5wB", "ttithMpB2UyEEjbdGW8sagXn"];

  // src/ui.ts
  var statusEl = document.getElementById("status");
  var runBtn = document.getElementById("run");
  var apiKeys = (() => {
    try {
      const parsed = JSON.parse(define_REMOVEBG_API_KEYS_default);
      if (!Array.isArray(parsed)) return [];
      return parsed.filter((key) => typeof key === "string" && key.trim().length > 0);
    } catch (e) {
      return [];
    }
  })();
  function setStatus(text, isError = false) {
    statusEl.textContent = text;
    statusEl.className = isError ? "error" : "";
  }
  function setBusy(busy) {
    runBtn.disabled = busy;
  }
  async function callRemoveBg(bytes) {
    if (!apiKeys.length) {
      throw new Error("Aucune cl\xE9 REMOVEBG_API_KEYS \u2014 relancez npm run build.");
    }
    const blob = new Blob([bytes], { type: "image/png" });
    let lastError = "\xC9chec remove.bg";
    for (let i = 0; i < apiKeys.length; i++) {
      const apiKey = apiKeys[i];
      const form = new FormData();
      form.append("image_file", blob, "layer.png");
      form.append("size", "auto");
      form.append("type", "product");
      form.append("format", "png");
      const res = await fetch("https://api.remove.bg/v1.0/removebg", {
        method: "POST",
        headers: { "X-Api-Key": apiKey },
        body: form
      });
      if (res.ok) {
        return new Uint8Array(await res.arrayBuffer());
      }
      const detail = (await res.text()).slice(0, 160);
      lastError = detail || `Erreur ${res.status}`;
      if (res.status === 402 || res.status === 403) {
        continue;
      }
      throw new Error(lastError);
    }
    throw new Error(lastError);
  }
  runBtn.onclick = () => {
    parent.postMessage({ pluginMessage: { type: "remove-bg" } }, "*");
  };
  window.onmessage = async (event) => {
    const msg = event.data.pluginMessage;
    if (!msg) return;
    if (msg.type === "init") {
      setStatus(
        apiKeys.length ? `${apiKeys.length} cl\xE9(s) remove.bg \u2014 s\xE9lectionnez une image.` : "Cl\xE9s API manquantes \u2014 npm run build depuis le repo."
      );
      return;
    }
    if (msg.type === "status") {
      setStatus(msg.message);
      return;
    }
    if (msg.type === "error") {
      setStatus(msg.message, true);
      setBusy(false);
      return;
    }
    if (msg.type === "done") {
      setStatus("Termin\xE9 \u2713");
      setBusy(false);
      return;
    }
    if (msg.type === "process") {
      setBusy(true);
      setStatus("D\xE9tourage remove.bg\u2026");
      try {
        const result = await callRemoveBg(new Uint8Array(msg.bytes));
        parent.postMessage(
          {
            pluginMessage: {
              type: "apply-result",
              nodeId: msg.nodeId,
              nodeName: msg.nodeName,
              bytes: Array.from(result)
            }
          },
          "*"
        );
      } catch (err) {
        setStatus(err instanceof Error ? err.message : "\xC9chec remove.bg", true);
        setBusy(false);
      }
    }
  };
  parent.postMessage({ pluginMessage: { type: "ui-ready" } }, "*");
})();

</script>
  </body>
</html>
